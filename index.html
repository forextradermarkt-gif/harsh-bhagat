        .page-container {
            background-color: #121212;

            max-width: 420px;
            border: 2px solid #e1b12c; /* Gold Border */

            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }

        .logo-section {
            margin-bottom: 15px;

            justify-content: center;
        }
        .logo-circle {
            width: 120px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-circle img {
            width: 85%;
            height: auto;

        }
