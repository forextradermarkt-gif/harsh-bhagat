    <script>
        function startCounter() {
            let obj = document.getElementById("memberCount");
            if (!obj) return;

            let start = 11800;    
            let end = 24000;      
            let duration = 1500;  
            let startTime = null;

            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = timestamp - startTime;
                
                let current = Math.min(Math.floor((progress / duration) * (end - start) + start), end);
                obj.innerText = current.toLocaleString('en-US');

                if (progress < duration) {
                    window.requestAnimationFrame(step);
                } else {
                    startRealtimeCounting();
                }
            }
            window.requestAnimationFrame(step);
        }

        function startRealtimeCounting() {
            let obj = document.getElementById("memberCount");
            setInterval(() => {
                let currentVal = parseInt(obj.innerText.replace(/,/g, ''));
                let randomIncrease = Math.floor(Math.random() * 3) + 1; 
                currentVal += randomIncrease;
                obj.innerText = currentVal.toLocaleString('en-US');
            }, 2500); 
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", startCounter);
        } else {
            startCounter();
        }
