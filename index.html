    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Gold Rounded Border Container */
        .page-container {
            background-color: #0f0f11;
            width: 100%;
            max-width: 410px;
            border: 2px solid #dfb141; 
            border-radius: 40px;
            padding: 35px 24px;
            text-align: center;
            box-shadow: 0px 15px 35px rgba(0,0,0,0.7);
        }

        /* Logo Design */
        .logo-section {
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
        }
        .logo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3.5px solid #dfb141;
            background-color: #032b18; 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-circle img {
            width: 85%;
            height: auto;
            object-fit: contain;
        }

        /* Title Style */
        .title-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .title-section h1 {
            color: #f7d046;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .crown {
            font-size: 22px;
        }

        /* Subtitle */
        .subtitle {
            color: #9aa0a6;
            font-size: 15px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .subtitle span {
            color: #26de81;
            font-weight: bold;
        }

        /* Members Badge */
        .members-badge {
            background-color: #1c1c1f;
            padding: 14px;
            border-radius: 16px;
            font-size: 17px;
            color: #ffffff;
            margin-bottom: 16px;
            font-weight: 600;
        }
        .members-badge span {
            color: #26de81 !important;
            font-weight: bold !important;
        }

        /* Tags Container */
        .tags-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }
        .tag {
            background-color: #1c1c1f;
            padding: 10px 20px;
            border-radius: 14px;
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 500;
        }

        /* Pop-up + Glow Animated Telegram Button */
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(90deg, #0099ff, #0077ff);
            color: white;
            text-decoration: none;
            font-size: 19px;
            font-weight: 700;
            padding: 16px;
            border-radius: 50px;
            width: 100%;
            margin-bottom: 28px;
            box-shadow: 0 0 20px rgba(0, 153, 255, 0.6);
            animation: popupGlow 1.4s infinite alternate ease-in-out;
            cursor: pointer;
        }
        .telegram-btn span {
            font-size: 22px;
            margin-left: 2px;
        }

        @keyframes popupGlow {
            0% {
                transform: scale(0.97);
                box-shadow: 0 0 12px rgba(0, 153, 255, 0.5);
            }
            100% {
                transform: scale(1.04);
                box-shadow: 0 0 30px rgba(0, 153, 255, 0.9);
            }
        }
